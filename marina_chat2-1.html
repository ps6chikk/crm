<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
<title>Marina</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D0B14;
  --s1: #13101E;
  --s2: #1A1628;
  --border: #2A2540;
  --border2: #3D3660;
  --accent: #C084FC;
  --accent2: #818CF8;
  --text: #EDE9FF;
  --muted: #6B6490;
  --muted2: #9490B8;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(192,132,252,0.05) 0%, transparent 60%),
              radial-gradient(ellipse 40% 60% at 80% 80%, rgba(129,140,248,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 1.2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(13,11,20,0.98);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo { display: flex; align-items: center; gap: 0.6rem; }
.logo-icon {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; flex-shrink: 0;
}
.logo-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.05rem; }
.logo-model { font-size: 0.58rem; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; }

.header-right { display: flex; gap: 0.4rem; }
.btn-icon {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--s2);
  color: var(--muted2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; transition: all 0.2s;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

/* CONVERSATIONS BAR */
.conv-bar {
  display: flex;
  gap: 0.4rem;
  padding: 0.6rem 1rem;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--s1);
  position: relative;
  z-index: 10;
  align-items: center;
}
.conv-bar::-webkit-scrollbar { display: none; }

.conv-chip {
  flex-shrink: 0;
  padding: 0.3rem 0.8rem;
  border-radius: 50px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.conv-chip.active {
  background: rgba(192,132,252,0.12);
  border-color: var(--accent);
  color: var(--accent);
}
.conv-chip-new {
  flex-shrink: 0;
  padding: 0.3rem 0.75rem;
  border-radius: 50px;
  border: 1px dashed var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.conv-chip-new:hover { border-color: var(--accent); color: var(--accent); }

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
  position: relative;
  z-index: 1;
  overscroll-behavior: contain;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.message { display: flex; gap: 0.6rem; animation: mi 0.25s ease; }
@keyframes mi { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; margin-top: 2px;
}
.avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.avatar.user { background: linear-gradient(135deg, #F472B6, #FB923C); }

.bubble {
  max-width: 82%; padding: 0.7rem 0.95rem;
  border-radius: 16px; font-size: 0.87rem;
  line-height: 1.7; white-space: pre-wrap; word-break: break-word;
}
.message.ai .bubble {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px; color: var(--text);
}
.message.user .bubble {
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: 16px 4px 16px 16px; color: var(--muted2);
}

/* EMPTY */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 0.5rem; color: var(--muted);
}
.empty-icon { font-size: 1.8rem; opacity: 0.35; margin-bottom: 0.2rem; }
.empty-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--muted2); }
.empty-sub { font-size: 0.72rem; color: var(--muted); }

/* TYPING */
.typing { display: flex; gap: 0.6rem; align-items: flex-start; }
.typing-dots {
  display: flex; gap: 4px; padding: 0.7rem 0.9rem;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); animation: dp 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dp { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.1)} }

/* INPUT */
.input-area {
  padding: 0.7rem 1rem 0.9rem;
  border-top: 1px solid var(--border);
  background: rgba(13,11,20,0.98);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.input-hint {
  font-size: 0.58rem; color: var(--muted);
  text-align: center; margin-bottom: 0.5rem;
  letter-spacing: 0.03em;
}

.input-wrap {
  display: flex; gap: 0.5rem; align-items: flex-end;
  background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 0.45rem 0.45rem 0.45rem 0.85rem;
  transition: border-color 0.2s;
}
.input-wrap:focus-within { border-color: var(--accent); }

#input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; line-height: 1.5;
  resize: none; max-height: 100px; min-height: 24px;
}
#input::placeholder { color: var(--muted); }

.send-btn {
  width: 34px; height: 34px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; flex-shrink: 0;
  transition: opacity 0.2s, transform 0.15s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* MODAL */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  z-index: 500; display: none; align-items: flex-end;
}
.overlay.open { display: flex; animation: fi 0.2s; }
@keyframes fi { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0; width: 100%;
  max-height: 80vh; overflow-y: auto;
  padding: 1.2rem; animation: su 0.3s ease;
}
@keyframes su { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.2rem; }
.modal-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 1.2rem; margin-bottom: 1rem;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-close {
  background: var(--s2); border: none; color: var(--muted2);
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem;
}
.field { margin-bottom: 0.85rem; }
.field label {
  display: block; font-size: 0.62rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted2); margin-bottom: 0.35rem;
}
input, textarea, .modal textarea {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  color: var(--text); background: var(--s2);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.2s;
}
input:focus, textarea:focus { border-color: var(--accent); }
.modal textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.btn {
  width: 100%; padding: 0.82rem; border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.btn-primary:hover { opacity: 0.88; }
.btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--muted2); margin-top: 0.5rem; }
.btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #F87171; margin-top: 0.5rem; }

/* CONV LIST */
.conv-item {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 12px; padding: 0.85rem; margin-bottom: 0.5rem;
  cursor: pointer; transition: border-color 0.2s;
  display: flex; justify-content: space-between; align-items: center;
}
.conv-item:hover { border-color: var(--border2); }
.conv-item.active { border-color: var(--accent); background: rgba(192,132,252,0.05); }
.conv-item-name { font-size: 0.88rem; font-weight: 500; }
.conv-item-meta { font-size: 0.68rem; color: var(--muted2); margin-top: 0.15rem; }
.conv-del {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 0.8rem; padding: 0.2rem 0.4rem;
  border-radius: 6px; transition: color 0.2s; flex-shrink: 0;
}
.conv-del:hover { color: #F87171; }

/* TOAST */
.toast {
  position: fixed; bottom: 5rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: white;
  padding: 0.5rem 1.2rem; border-radius: 50px;
  font-size: 0.78rem; font-weight: 500;
  opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-name">Marina</div>
      <div class="logo-model">GPT-4.1</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-icon" onclick="openModal('modal-convs')" title="Conversations">💬</button>
    <button class="btn-icon" onclick="clearCurrent()" title="Vider la conversation">🗑️</button>
    <button class="btn-icon" onclick="openModal('modal-settings')" title="Paramètres">⚙️</button>
  </div>
</div>

<div class="conv-bar" id="convBar">
  <button class="conv-chip-new" onclick="newConv()">+ Nouvelle</button>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <div class="input-hint">Retour à la ligne : ↵ &nbsp;·&nbsp; Envoyer : bouton ➤</div>
  <div class="input-wrap">
    <textarea id="input" placeholder="Écris quelque chose…" rows="1" oninput="resize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL SETTINGS -->
<div class="overlay" id="modal-settings">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      Paramètres
      <button class="modal-close" onclick="closeModal('modal-settings')">✕</button>
    </div>
    <div class="field">
      <label>Clé API OpenAI</label>
      <input type="password" id="keyInput" placeholder="sk-…" autocomplete="off">
    </div>
    <div style="font-size:0.7rem;color:var(--muted);line-height:1.6;margin-bottom:1rem;">
      Obtiens ta clé sur <strong style="color:var(--text);">platform.openai.com</strong>
    </div>
    <div class="field">
      <label>Instructions personnalisées <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optionnel)</span></label>
      <textarea id="sysInput" placeholder="Ex : Tu es un assistant créatif…"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">Sauvegarder</button>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
      <div style="font-size:0.62rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted2);margin-bottom:0.7rem;">Données</div>
      <button class="btn btn-ghost" onclick="backupData()">💾 Sauvegarder mes conversations (JSON)</button>
      <button class="btn btn-ghost" style="margin-top:0.5rem;" onclick="document.getElementById('importInput').click()">📥 Restaurer une sauvegarde</button>
      <input type="file" id="importInput" accept=".json" style="display:none;" onchange="restoreData(this)">
      <button class="btn btn-danger" onclick="clearAll()">🗑️ Effacer toutes les données</button>
    </div>
  </div>
</div>

<!-- MODAL CONVERSATIONS -->
<div class="overlay" id="modal-convs">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      Conversations
      <button class="modal-close" onclick="closeModal('modal-convs')">✕</button>
    </div>
    <div id="convList"></div>
    <button class="btn btn-ghost" onclick="newConv();closeModal('modal-convs')">+ Nouvelle conversation</button>
  </div>
</div>

<script>
// ══════════════════════════
// STATE
// ══════════════════════════
let convs = [];
let currentId = null;

function load() {
  try { convs = JSON.parse(localStorage.getItem('marina_convs') || '[]'); } catch { convs = []; }
  if (convs.length === 0) createConv('Discussion');
  else {
    currentId = convs[0].id;
    renderAll();
  }
}

function save() { localStorage.setItem('marina_convs', JSON.stringify(convs)); }
function getKey() { return localStorage.getItem('marina_key') || ''; }
function getSys() { return localStorage.getItem('marina_sys') || ''; }
function getCurrent() { return convs.find(c => c.id === currentId) || null; }

// ══════════════════════════
// CONVERSATIONS
// ══════════════════════════
function createConv(name) {
  const c = {
    id: Date.now().toString(),
    name: name || 'Discussion ' + (convs.length + 1),
    messages: [],
    createdAt: new Date().toISOString()
  };
  convs.unshift(c);
  currentId = c.id;
  save();
  renderAll();
}

function newConv() {
  const name = prompt('Nom de la conversation :', 'Discussion ' + (convs.length + 1));
  if (name === null) return;
  createConv(name || 'Discussion ' + (convs.length + 1));
}

function switchConv(id) {
  currentId = id;
  renderAll();
  closeModal('modal-convs');
}

function deleteConv(id, e) {
  e.stopPropagation();
  const c = convs.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`Supprimer "${c.name}" ?`)) return;
  convs = convs.filter(x => x.id !== id);
  if (currentId === id) currentId = convs[0]?.id || null;
  if (convs.length === 0) createConv('Discussion');
  else { save(); renderAll(); }
  showToast('Conversation supprimée');
}

function clearCurrent() {
  const c = getCurrent();
  if (!c || c.messages.length === 0) { showToast('Conversation déjà vide'); return; }
  if (!confirm(`Vider "${c.name}" ?`)) return;
  c.messages = [];
  save();
  renderMessages();
  showToast('Conversation vidée');
}

function backupData() {
  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    convs,
    sys: getSys()
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toLocaleDateString('fr-FR').replace(/\//g, '-');
  a.href = url;
  a.download = `marina-backup-${date}.json`;
  a.click();
  showToast('💾 Sauvegarde téléchargée !');
}

function restoreData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.convs || !Array.isArray(backup.convs)) throw new Error('Fichier invalide');
      if (!confirm(`Restaurer ${backup.convs.length} conversation(s) depuis le ${new Date(backup.exportedAt).toLocaleDateString('fr-FR')} ?\nCela remplacera toutes tes données actuelles.`)) return;
      convs = backup.convs;
      currentId = convs[0]?.id || null;
      if (backup.sys) localStorage.setItem('marina_sys', backup.sys);
      save();
      renderAll();
      closeModal('modal-settings');
      showToast(`✓ ${convs.length} conversation(s) restaurée(s) !`);
    } catch { showToast('❌ Fichier invalide'); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ══════════════════════════
// RENDER
// ══════════════════════════
function renderAll() {
  renderConvBar();
  renderMessages();
}

function renderConvBar() {
  const bar = document.getElementById('convBar');
  bar.innerHTML = '<button class="conv-chip-new" onclick="newConv()">+</button>';
  convs.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'conv-chip' + (c.id === currentId ? ' active' : '');
    btn.textContent = c.name;
    btn.onclick = () => switchConv(c.id);
    bar.appendChild(btn);
  });
}

function renderMessages() {
  const container = document.getElementById('messages');
  const conv = getCurrent();
  container.innerHTML = '';

  if (!conv || conv.messages.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✦</div>
        <div class="empty-text">Bonjour Marina</div>
        <div class="empty-sub">Commence à écrire pour démarrer</div>
      </div>`;
    return;
  }

  conv.messages.forEach(m => addBubble(m.role, m.content, container, false));
  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
}

function addBubble(role, content, container, animate) {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  if (!animate) wrap.style.animation = 'none';

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '✦' : '♡';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  container.appendChild(wrap);
}

function renderConvList() {
  const list = document.getElementById('convList');
  if (convs.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = convs.map(c => `
    <div class="conv-item ${c.id === currentId ? 'active' : ''}" onclick="switchConv('${c.id}')">
      <div>
        <div class="conv-item-name">${escHtml(c.name)}</div>
        <div class="conv-item-meta">${c.messages.length} message${c.messages.length > 1 ? 's' : ''}</div>
      </div>
      <button class="conv-del" onclick="deleteConv('${c.id}', event)">✕</button>
    </div>`).join('');
}

// ══════════════════════════
// SEND
// ══════════════════════════
async function send() {
  const conv = getCurrent();
  if (!conv) return;
  const key = getKey();
  if (!key.startsWith('sk-')) { showToast('🔑 Configure ta clé API'); openModal('modal-settings'); return; }

  const text = document.getElementById('input').value.trim();
  if (!text) return;

  const container = document.getElementById('messages');
  const emptyEl = container.querySelector('.empty');
  if (emptyEl) emptyEl.remove();

  conv.messages.push({ role: 'user', content: text });
  save();
  addBubble('user', text, container, true);

  document.getElementById('input').value = '';
  resize(document.getElementById('input'));
  container.scrollTop = container.scrollHeight;

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.id = 'typing';
  typing.innerHTML = `<div class="avatar ai">✦</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;

  document.getElementById('sendBtn').disabled = true;

  try {
    const messages = conv.messages.slice(-40).map(m => ({
      role: m.role === 'ai' ? 'assistant' : 'user',
      content: m.content
    }));

    const body = { model: 'gpt-4.1', max_tokens: 1000, messages };
    const sys = getSys();
    if (sys) body.messages = [{ role: 'system', content: sys }, ...messages];

    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const reply = data.choices[0].message.content;
    conv.messages.push({ role: 'ai', content: reply });
    save();

    typing.remove();
    addBubble('ai', reply, container, true);
    container.scrollTop = container.scrollHeight;

  } catch(e) {
    typing.remove();
    conv.messages.pop();
    save();
    showToast('Erreur : ' + e.message);
  } finally {
    document.getElementById('sendBtn').disabled = false;
  }
}

// ══════════════════════════
// SETTINGS
// ══════════════════════════
function saveSettings() {
  const k = document.getElementById('keyInput').value.trim();
  const s = document.getElementById('sysInput').value.trim();
  if (k) localStorage.setItem('marina_key', k);
  localStorage.setItem('marina_sys', s);
  closeModal('modal-settings');
  showToast('✓ Sauvegardé');
}

function clearAll() {
  if (!confirm('Effacer toutes les données ?')) return;
  localStorage.clear();
  convs = [];
  createConv('Discussion');
  closeModal('modal-settings');
  showToast('Données effacées');
}

// ══════════════════════════
// MODALS
// ══════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modal-settings') {
    document.getElementById('keyInput').value = getKey();
    document.getElementById('sysInput').value = getSys();
  }
  if (id === 'modal-convs') renderConvList();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ══════════════════════════
// UTILS
// ══════════════════════════
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════
// INIT
// ══════════════════════════
load();
if (!getKey()) setTimeout(() => openModal('modal-settings'), 400);
</script>
</body>
</html>
